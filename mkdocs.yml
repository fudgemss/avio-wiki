site_name: Avio Bot Docs
site_url: https://docs.aviobot.app
theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: indigo
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - content.code.copy
    - toc.follow
    - navigation.footer
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features:
      - Flight Management: features/flight-management.md
      - Booking: features/booking.md
      - Miles Programme: features/miles-programme.md
      - Chat Settings: features/chat-settings.md
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - attr_list
  - md_in_html
copyright: "Copyright &copy; 2026 Avio Bot. All Rights Reserved. Not affiliated with Discord Inc."
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://aviobot.app/discord
    - icon: fontawesome/solid/envelope
      link: mailto:hello@aviobot.app
