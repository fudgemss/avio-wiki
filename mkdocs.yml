site_name: Avio Bot Docs
site_url: https://docs.aviobot.app

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: indigo
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
